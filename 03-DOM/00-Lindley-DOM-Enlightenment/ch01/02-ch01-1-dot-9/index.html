    <title>ch01-1-dot-9</title>
</head>
<body>
    <div id="A"><i>Hi</i></div>
    <div id="B">Dude<strong>!</strong></div>

    <script>
        const aEl = document.getElementById('A');
        const bEl = document.getElementById('B');

        console.log(aEl.innerText);
        console.log(bEl.innerText);
        console.log(aEl.innerHTML);
        console.log(bEl.innerHTML);
        console.log(aEl.outerText);
        console.log(bEl.outerText);
        console.log(aEl.textContent);
        console.log(bEl.textContent);
    </script>
</body>
