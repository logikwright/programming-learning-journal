<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>passing-arguments</title>
</head>
<body>
    <script>
        const logCompliment = function (firstName, message) {
            return`You're doing great, ${firstName}. ${message}!`;
        }

        console.log(logCompliment("Niraj", "Keep up the hard work"));

    </script>
</body>
</html>
