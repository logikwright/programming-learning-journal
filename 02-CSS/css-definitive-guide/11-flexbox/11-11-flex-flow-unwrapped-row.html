<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A row-oriented unwrapped flex flow</title>
    <link rel="stylesheet" href="c/examples.css"/>
    <style>
        body {
            font-size: 16px;
            text-align: center;
            padding: 100px;
        }

        article {
            width: 500px;
        }

        article:nth-of-type(n+8) {
            height: 500px;
        }
        
        article:nth-of-type(n+8) span {
            max-width: 5em;
        }

        section {
            display: flex;
            border: 1px dashed;
            padding: 10px;
        }

        span {
            border: 1px solid;
            margin: 10px;
            padding: 0.5em 1em;
            background-color: rgba(0, 0, 0, 0.1);
            font-family: "unbuntu mono", monospace;
        }

        p {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <article>
        <section style="flex-flow: row nowrap">
            <span>A</span>
            <span>BB</span>
            <span>CCC</span>
            <span>DD<br>DD</span>
            <span>EEE<br>EE</span>
            <span>FFF<br>FFF</span>
            <span>GGG<br>GGG<br>G</span>
            <span>HH<br>HH<br>HH<br>HH</span>
            <span>III<br>III<br>III</span>
            <span>JJJJJ<br>JJJJJ</span>
        </section>
    </article>
</body>
</html>
