<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        #container {
            display: flex;
            justify-content: space-around;
        }

        #container>div {
            height: 5em;
            width: 5em;
            background-color: purple;
        }
    </style>
    <title>Global Loop</title>
</head>
<body>
    <h1>Click on a Box</h1>
    <div id="container">
    </div>

    <script>
        var div, containter = document.getElementById("container");

        for(var i=0; i < 5; i++) {
            div = document.createElement("div");
            div.onclick = function() {
                alert("This is box #" + i);
            };

            container.appendChild(div);
        }
    </script>
</body>
</html>
